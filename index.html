<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Gastos por Obra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --warning: #f39c12;
            --dark: #2c3e50;
            --bg: #f4f7f6;
            --border: #ddd;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2, h3 { color: var(--dark); margin-top: 0; }
        
        details {
            background: #fdfdfd;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        summary {
            padding: 15px 20px;
            background-color: #f8f9fa;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '▼'; font-size: 0.8em; color: var(--dark); }
        details[open] summary::after { content: '▲'; }
        .accordion-content {
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        .form-horizontal {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .form-horizontal .form-group {
            flex: 1;
            min-width: 150px;
            margin-bottom: 0;
        }
        .form-horizontal button {
            width: auto;
            padding: 10px 25px;
        }

        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85em; color: #555; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        .moneda-symbol {
            position: absolute;
            left: 10px;
            top: 33px;
            font-weight: bold;
            color: #7f8c8d;
        }
        .input-moneda { padding-left: 25px; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #27ae60; }
        .btn-warning { background-color: var(--warning); padding: 5px 10px; font-size: 0.8em;}
        .btn-warning:hover { background-color: #d68910; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: var(--dark); }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; color: white; }
        .bg-materiales { background-color: #e67e22; }
        .bg-mano-obra { background-color: #9b59b6; }
        .bg-extras { background-color: #95a5a6; }
        
        #panel-gastos { display: none; }
        .grafico-container { position: relative; height: 300px; width: 100%; }
        
        .cotizacion-info {
            font-size: 0.75em;
            color: #7f8c8d;
            margin-top: 4px;
            display: block;
        }
        
        .controles-tabla {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Panel de Control de Obras</h1>

    <details open>
        <summary>Gestión de Obras (Crear y Seleccionar)</summary>
        <div class="accordion-content grid-2">
            <div>
                <label for="nombre-obra">Nueva Obra</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="nombre-obra" placeholder="Nombre de la obra">
                    <button id="btn-crear-obra">Crear</button>
                </div>
            </div>
            <div>
                <label for="select-obra">Seleccionar Obra Existente</label>
                <select id="select-obra">
                    <option value="">-- Seleccioná una obra --</option>
                </select>
            </div>
        </div>
    </details>

    <div id="panel-gastos">
        <h2 style="border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px;">
            Administrando: <span id="titulo-obra-activa" style="color: var(--primary);"></span>
        </h2>

        <div class="section">
            <form id="form-gasto" class="form-horizontal">
                <input type="hidden" id="id-gasto-editando" value="">
                
                <div class="form-group" style="flex: 1.5;">
                    <label for="categoria-gasto">Categoría</label>
                    <select id="categoria-gasto" required>
                        <option value="Materiales">Materiales</option>
                        <option value="Mano de Obra">Mano de Obra</option>
                        <option value="Extras">Extras</option>
                    </select>
                </div>
                
                <div class="form-group" style="flex: 1.5;">
                    <label for="precio-gasto-ars">Precio (ARS)</label>
                    <span class="moneda-symbol">$</span>
                    <input type="text" id="precio-gasto-ars" class="input-moneda" required placeholder="0.00">
                </div>
                
                <div class="form-group" style="flex: 1.5;">
                    <label for="precio-gasto-usd">Precio (USD Oficial)</label>
                    <span class="moneda-symbol">U$D</span>
                    <input type="text" id="precio-gasto-usd" class="input-moneda" required placeholder="0.00">
                    <small id="info-cotizacion" class="cotizacion-info">Cargando dólar...</small>
                </div>

                <div class="form-group" style="flex: 2;">
                    <label for="detalle-gasto">Detalle</label>
                    <input type="text" id="detalle-gasto" required placeholder="Ej: Cemento">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label for="extra-gasto">Extra</label>
                    <input type="text" id="extra-gasto" placeholder="Opcional">
                </div>
                
                <div style="display: flex; gap: 10px; width: 100%; margin-top: 10px;">
                    <button type="submit" id="btn-submit-gasto" class="btn-success">Cargar Gasto</button>
                    <button type="button" id="btn-cancelar-edicion" style="display: none; background: #95a5a6;">Cancelar</button>
                </div>
            </form>
        </div>

        <details>
            <summary>Evolución de Gastos en el Tiempo (Ver Gráfico)</summary>
            <div class="accordion-content">
                <div class="grafico-container">
                    <canvas id="graficoGastos"></canvas>
                </div>
            </div>
        </details>

        <div class="section" style="padding: 0; border: none; background: transparent;">
            
            <div class="controles-tabla">
                <h3 style="margin: 0;">Historial de Gastos</h3>
                <div>
                    <label for="orden-gastos" style="display: inline-block; margin-right: 10px;">Ordenar por:</label>
                    <select id="orden-gastos" style="width: auto; display: inline-block;">
                        <option value="fecha_desc">Fecha (Más nuevos primero)</option>
                        <option value="fecha_asc">Fecha (Más viejos primero)</option>
                        <option value="valor_desc">Mayor Precio</option>
                        <option value="valor_asc">Menor Precio</option>
                        <option value="categoria_asc">Categoría (A - Z)</option>
                    </select>
                </div>
            </div>

            <div style="background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Categoría</th>
                            <th>Detalle</th>
                            <th>Extra</th>
                            <th>ARS ($)</th>
                            <th>USD (U$D)</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-gastos">
                        </tbody>
                </table>
            </div>
            <h3 style="text-align: right; margin-top: 15px; font-size: 1.5em;">
                Total Obra: $<span id="total-gastos-ars">0.00</span> | U$D <span id="total-gastos-usd">0.00</span>
            </h3>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, serverTimestamp, doc, updateDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWtvTrQ11b7iWF_5HyZu9SKCmBMnV1f9M",
      authDomain: "calculos-a3461.firebaseapp.com",
      projectId: "calculos-a3461",
      storageBucket: "calculos-a3461.firebasestorage.app",
      messagingSenderId: "319504557142",
      appId: "1:319504557142:web:3211c1473c73d1080cc7f7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let obraActivaId = null;
    let unsubscribeGastos = null;
    let chartInstance = null; 
    let gastosActualesEnMemoria = []; // Guardamos los gastos para ordenarlos sin llamar a Firebase de nuevo

    // Variables Dólar
    let tasaDolarOficial = 1000; // Valor por defecto por si falla la API

    // Referencias DOM
    const selectObra = document.getElementById('select-obra');
    const panelGastos = document.getElementById('panel-gastos');
    const tituloObraActiva = document.getElementById('titulo-obra-activa');
    const formGasto = document.getElementById('form-gasto');
    const btnCrearObra = document.getElementById('btn-crear-obra');
    const inputArs = document.getElementById('precio-gasto-ars');
    const inputUsd = document.getElementById('precio-gasto-usd');
    const selectOrden = document.getElementById('orden-gastos');
    const btnSubmitGasto = document.getElementById('btn-submit-gasto');
    const btnCancelarEdicion = document.getElementById('btn-cancelar-edicion');
    const inputIdEditando = document.getElementById('id-gasto-editando');

    // === INICIO: LÓGICA DE DÓLAR Y FORMATEO === //
    async function obtenerCotizacionDolar() {
        try {
            const respuesta = await fetch('https://dolarapi.com/v1/dolares/oficial');
            const data = await respuesta.json();
            tasaDolarOficial = data.venta;
            document.getElementById('info-cotizacion').textContent = `Cotización: $${tasaDolarOficial}`;
        } catch (error) {
            console.error("Error cargando dólar", error);
            document.getElementById('info-cotizacion').textContent = `Cotización manual: $${tasaDolarOficial}`;
        }
    }
    obtenerCotizacionDolar();

    function limpiarNumero(stringNum) {
        if(!stringNum) return 0;
        return parseFloat(stringNum.replace(/\./g, '').replace(',', '.')) || 0;
    }

    function formatearConPuntos(num) {
        let partes = num.toFixed(2).replace('.', ',').split(',');
        partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return partes.join(',');
    }

    // Evento al escribir Pesos
    inputArs.addEventListener('input', function() {
        // Formateo visual del input actual
        let val = this.value.replace(/[^\d,]/g, '');
        let partes = val.split(',');
        partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        if (partes.length > 1) { this.value = partes[0] + ',' + partes[1].substring(0, 2); } 
        else { this.value = partes[0]; }

        // Calculo automático de USD
        let ars = limpiarNumero(this.value);
        let usd = ars / tasaDolarOficial;
        inputUsd.value = formatearConPuntos(usd);
    });

    // Evento al escribir Dólares
    inputUsd.addEventListener('input', function() {
        // Formateo visual del input actual
        let val = this.value.replace(/[^\d,]/g, '');
        let partes = val.split(',');
        partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        if (partes.length > 1) { this.value = partes[0] + ',' + partes[1].substring(0, 2); } 
        else { this.value = partes[0]; }

        // Calculo automático de ARS
        let usd = limpiarNumero(this.value);
        let ars = usd * tasaDolarOficial;
        inputArs.value = formatearConPuntos(ars);
    });
    // === FIN LÓGICA DÓLAR === //

    // 1. Escuchar Obras
    const qObras = query(collection(db, "obras"), orderBy("fechaCreacion", "desc"));
    onSnapshot(qObras, (snapshot) => {
        const valorActual = selectObra.value;
        selectObra.innerHTML = '<option value="">-- Seleccioná una obra --</option>';
        snapshot.forEach((doc) => {
            const option = document.createElement('option');
            option.value = doc.id;
            option.textContent = doc.data().nombre;
            selectObra.appendChild(option);
        });
        if (valorActual) selectObra.value = valorActual;
    });

    // 2. Crear Obra
    btnCrearObra.addEventListener('click', async () => {
        const nombreInput = document.getElementById('nombre-obra');
        if (!nombreInput.value.trim()) return alert("Ingresá un nombre.");
        try {
            const docRef = await addDoc(collection(db, "obras"), {
                nombre: nombreInput.value.trim(),
                fechaCreacion: serverTimestamp()
            });
            nombreInput.value = '';
            selectObra.value = docRef.id;
            selectObra.dispatchEvent(new Event('change'));
            document.querySelector('details').removeAttribute('open');
        } catch (e) { console.error(e); }
    });

    // 3. Seleccionar Obra
    selectObra.addEventListener('change', (e) => {
        obraActivaId = e.target.value;
        if (unsubscribeGastos) unsubscribeGastos();
        
        if (obraActivaId) {
            tituloObraActiva.textContent = e.target.options[e.target.selectedIndex].text;
            panelGastos.style.display = 'block';
            resetearFormulario();
            escucharGastos(obraActivaId);
        } else {
            panelGastos.style.display = 'none';
        }
    });

    // 4. Escuchar Gastos de Firebase (Solo lectura, se guarda en memoria)
    function escucharGastos(obraId) {
        const qGastos = query(collection(db, "gastos"), where("obraId", "==", obraId));
        unsubscribeGastos = onSnapshot(qGastos, (snapshot) => {
            gastosActualesEnMemoria = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data(),
                // Extraemos el tiempo real para ordenar. Si acaba de crearse, usamos Date.now()
                tiempoReal: doc.data().timestamp ? doc.data().timestamp.toMillis() : Date.now() 
            }));
            renderizarTablaYGrafico();
        });
    }

    // 5. Ordenar, Renderizar Tabla y Gráfico
    selectOrden.addEventListener('change', renderizarTablaYGrafico);

    function renderizarTablaYGrafico() {
        const listaGastos = document.getElementById('lista-gastos');
        const spanTotalArs = document.getElementById('total-gastos-ars');
        const spanTotalUsd = document.getElementById('total-gastos-usd');
        
        let totalArs = 0;
        let totalUsd = 0;
        listaGastos.innerHTML = '';
        const gastosPorFecha = {}; // Para el gráfico

        // Copiamos y ORDENAMOS el array de memoria según el select
        const orden = selectOrden.value;
        let gastosOrdenados = [...gastosActualesEnMemoria].sort((a, b) => {
            if (orden === 'fecha_desc') return b.tiempoReal - a.tiempoReal;
            if (orden === 'fecha_asc') return a.tiempoReal - b.tiempoReal;
            if (orden === 'valor_desc') return b.precio - a.precio;
            if (orden === 'valor_asc') return a.precio - b.precio;
            if (orden === 'categoria_asc') return a.categoria.localeCompare(b.categoria);
            return 0;
        });

        if (gastosOrdenados.length === 0) {
            listaGastos.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay gastos.</td></tr>';
            spanTotalArs.textContent = '0.00';
            spanTotalUsd.textContent = '0.00';
            actualizarGrafico({});
            return;
        }

        // Construir HTML de la Tabla
        gastosOrdenados.forEach((gasto) => {
            totalArs += gasto.precio;
            let usdGasto = gasto.precio / gasto.cotizacionDolarGuardada; // Usamos el dolar del momento de la compra
            totalUsd += usdGasto;
            
            let claseBadge = gasto.categoria === 'Materiales' ? 'bg-materiales' : 
                             gasto.categoria === 'Mano de Obra' ? 'bg-mano-obra' : 'bg-extras';

            const detSeguro = gasto.detalle.replace(/'/g, "\\'");
            const extSeguro = (gasto.extra || '').replace(/'/g, "\\'");

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${gasto.fechaStr}</td>
                <td><span class="badge ${claseBadge}">${gasto.categoria}</span></td>
                <td>${gasto.detalle}</td>
                <td>${gasto.extra || '-'}</td>
                <td>$${gasto.precio.toLocaleString('es-AR', { minimumFractionDigits: 2 })}</td>
                <td style="color: #27ae60; font-weight: bold;">U$D ${usdGasto.toLocaleString('es-AR', { minimumFractionDigits: 2 })}</td>
                <td>
                    <button type="button" class="btn-warning" onclick="window.prepararEdicion('${gasto.id}', '${gasto.categoria}', ${gasto.precio}, ${usdGasto}, '${detSeguro}', '${extSeguro}')">Editar</button>
                </td>
            `;
            listaGastos.appendChild(tr);

            // Preparar datos para el gráfico (Cronológico siempre)
            if (!gastosPorFecha[gasto.fechaStr]) gastosPorFecha[gasto.fechaStr] = 0;
            gastosPorFecha[gasto.fechaStr] += gasto.precio;
        });

        spanTotalArs.textContent = totalArs.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        spanTotalUsd.textContent = totalUsd.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        
        actualizarGrafico(gastosPorFecha);
    }

    // LÓGICA DEL GRÁFICO (Siempre lo ordena por fecha cronológica)
    function actualizarGrafico(datosFechas) {
        // Ordenamos las fechas de menor a mayor (cronológicamente) para que el gráfico tenga sentido
        const fechasOrdenadas = Object.keys(datosFechas).sort((a, b) => {
            const dateA = new Date(a.split('/').reverse().join('-')); // Convierte DD/MM/YYYY a YYYY-MM-DD
            const dateB = new Date(b.split('/').reverse().join('-'));
            return dateA - dateB;
        });
        
        const valores = fechasOrdenadas.map(f => datosFechas[f]);

        const ctx = document.getElementById('graficoGastos').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: fechasOrdenadas,
                datasets: [{
                    label: 'Gasto Total por Día (ARS $)',
                    data: valores,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 3,
                    pointBackgroundColor: '#2c3e50',
                    pointRadius: 4,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }

    // 6. Preparar Edición
    window.prepararEdicion = function(id, categoria, precioArs, precioUsd, detalle, extra) {
        inputIdEditando.value = id;
        document.getElementById('categoria-gasto').value = categoria;
        
        inputArs.value = formatearConPuntos(precioArs);
        inputUsd.value = formatearConPuntos(precioUsd);
        
        document.getElementById('detalle-gasto').value = detalle;
        document.getElementById('extra-gasto').value = extra;

        btnSubmitGasto.textContent = 'Actualizar Gasto';
        btnSubmitGasto.style.backgroundColor = '#f39c12';
        btnCancelarEdicion.style.display = 'inline-block';
        document.getElementById('form-gasto').scrollIntoView({ behavior: 'smooth' });
    };

    function resetearFormulario() {
        formGasto.reset();
        inputIdEditando.value = '';
        btnSubmitGasto.textContent = 'Cargar Gasto';
        btnSubmitGasto.style.backgroundColor = '#2ecc71';
        btnCancelarEdicion.style.display = 'none';
    }

    btnCancelarEdicion.addEventListener('click', resetearFormulario);

    // 7. Cargar o Actualizar Gasto
    formGasto.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!obraActivaId) return;

        btnSubmitGasto.disabled = true;
        btnSubmitGasto.textContent = 'Guardando...';

        let precioArsLimpio = limpiarNumero(inputArs.value);
        let precioUsdLimpio = limpiarNumero(inputUsd.value);
        
        // Derivamos la cotización de este momento exacto de la compra (Para que el historial no mute con los días)
        let cotizacionGuardada = precioArsLimpio / precioUsdLimpio; 

        const idEditando = inputIdEditando.value;

        try {
            if (idEditando) {
                // Actualizar
                const gastoRef = doc(db, "gastos", idEditando);
                await updateDoc(gastoRef, {
                    categoria: document.getElementById('categoria-gasto').value,
                    precio: precioArsLimpio,
                    cotizacionDolarGuardada: cotizacionGuardada,
                    detalle: document.getElementById('detalle-gasto').value.trim(),
                    extra: document.getElementById('extra-gasto').value.trim()
                });
            } else {
                // Crear
                const fechaActual = new Date().toLocaleDateString('es-AR', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });
                await addDoc(collection(db, "gastos"), {
                    obraId: obraActivaId,
                    categoria: document.getElementById('categoria-gasto').value,
                    precio: precioArsLimpio,
                    cotizacionDolarGuardada: cotizacionGuardada,
                    detalle: document.getElementById('detalle-gasto').value.trim(),
                    extra: document.getElementById('extra-gasto').value.trim(),
                    fechaStr: fechaActual,
                    timestamp: serverTimestamp() 
                });
            }
            resetearFormulario();
        } catch (error) {
            console.error(error);
            alert("Error al guardar en Firebase.");
        } finally {
            btnSubmitGasto.disabled = false;
        }
    });
</script>

</body>
</html>
