<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Gastos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --primary: #0f172a;
            --primary-hover: #334155;
            --accent: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.02em; }
        h2 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        h3 { font-size: 1rem; font-weight: 600; color: var(--text-main); margin-bottom: 15px; }

        /* Acordeones limpios */
        details {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        details:hover { box-shadow: var(--shadow-md); }
        
        summary {
            padding: 20px 24px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
        }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '+'; font-size: 1.2rem; font-weight: 400; color: var(--text-muted); }
        details[open] summary::after { content: '−'; }
        
        .accordion-content {
            padding: 0 24px 24px 24px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        /* Formularios minimalistas */
        .form-group { margin-bottom: 16px; position: relative; }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: var(--text-muted); 
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background-color: var(--bg-page);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-horizontal { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        .form-horizontal .form-group { flex: 1; min-width: 140px; margin-bottom: 0; }
        
        .moneda-symbol { position: absolute; left: 14px; top: 34px; font-weight: 500; color: var(--text-muted); }
        .input-moneda { padding-left: 35px; }
        .cotizacion-info { position: absolute; font-size: 0.7rem; color: var(--text-muted); right: 0; top: 0; }

        /* Botones elegantes */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        
        .btn-crear { background-color: var(--primary); width: 100%; }
        .btn-submit { background-color: var(--accent); white-space: nowrap; }
        .btn-submit:hover { background-color: #1d4ed8; }
        
        .btn-text { background: none; color: var(--text-muted); padding: 8px 12px; font-size: 0.85rem; }
        .btn-text:hover { background: #f1f5f9; color: var(--text-main); transform: none; }
        
        .btn-danger-text { background: none; color: var(--danger); opacity: 0.7; padding: 8px 16px; }
        .btn-danger-text:hover { background: #fee2e2; opacity: 1; transform: none; }

        /* Panel Principal de la Obra */
        #panel-gastos { 
            display: none; 
            background: var(--bg-card); 
            border-radius: var(--radius-lg); 
            padding: 30px; 
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            margin-top: 30px;
        }

        .header-obra {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; margin-bottom: 30px;
        }

        /* Etiquetas de estado y categorías (Estilo Píldora) */
        .badge { 
            padding: 4px 12px; 
            border-radius: 99px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .estado-activa { background-color: #dcfce7; color: #166534; }
        .estado-terminada { background-color: #f1f5f9; color: #475569; }
        
        .cat-materiales { background-color: #fef3c7; color: #92400e; }
        .cat-mano-obra { background-color: #e0e7ff; color: #3730a3; }
        .cat-extras { background-color: #f3f4f6; color: #374151; }

        /* Tabla limpia */
        .tabla-contenedor { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th { 
            padding: 16px; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }
        
        .td-precio { font-weight: 600; font-variant-numeric: tabular-nums; }
        .td-usd { color: var(--text-muted); font-variant-numeric: tabular-nums; }

        .totales-footer {
            display: flex; justify-content: flex-end; gap: 40px;
            margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);
        }
        .total-box { text-align: right; }
        .total-box span { display: block; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .total-box strong { font-size: 1.5rem; color: var(--primary); font-variant-numeric: tabular-nums; }

        .grafico-container { position: relative; height: 250px; width: 100%; margin: 30px 0; }
        
        /* Controles utilitarios */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .select-sutil { width: auto; padding: 8px 12px; font-size: 0.85rem; border: none; background: #f1f5f9; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tus Obras</h1>

    <details open id="acordeon-activas">
        <summary>En curso</summary>
        <div class="accordion-content grid-2">
            <div>
                <label for="select-obra">Seleccionar Obra</label>
                <select id="select-obra">
                    <option value="">Buscar obra activa...</option>
                </select>
            </div>
            <div>
                <label for="nombre-obra">Crear Nueva Obra</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="nombre-obra" placeholder="Nombre del proyecto">
                    <button id="btn-crear-obra" class="btn-crear">Crear</button>
                </div>
            </div>
        </div>
    </details>

    <details id="acordeon-historial">
        <summary>Historial (Terminadas)</summary>
        <div class="accordion-content tabla-contenedor" style="margin-top: -10px;">
            <table>
                <tbody id="lista-obras-terminadas">
                    </tbody>
            </table>
        </div>
    </details>

    <div id="panel-gastos">
        <div class="header-obra">
            <div style="display: flex; align-items: center; gap: 16px;">
                <h2 id="titulo-obra-activa"></h2>
                <span id="badge-estado-obra" class="badge"></span>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="btn-restaurar-obra" class="btn-text" style="display: none;">Restaurar</button>
                <button id="btn-terminar-obra" class="btn-text">Marcar como terminada</button>
                <button id="btn-borrar-obra" class="btn-danger-text">Eliminar</button>
            </div>
        </div>

        <div id="seccion-formulario-gastos" style="background: var(--bg-page); padding: 24px; border-radius: var(--radius-md); margin-bottom: 40px;">
            <form id="form-gasto" class="form-horizontal">
                <input type="hidden" id="id-gasto-editando" value="">
                
                <div class="form-group" style="flex: 1;">
                    <label for="categoria-gasto">Categoría</label>
                    <select id="categoria-gasto" required>
                        <option value="Materiales">Materiales</option>
                        <option value="Mano de Obra">Mano de Obra</option>
                        <option value="Extras">Extras</option>
                    </select>
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label for="precio-gasto-ars">ARS</label>
                    <span class="moneda-symbol">$</span>
                    <input type="text" id="precio-gasto-ars" class="input-moneda" required placeholder="0,00">
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label for="precio-gasto-usd">USD <span id="info-cotizacion" class="cotizacion-info">...</span></label>
                    <span class="moneda-symbol">U$D</span>
                    <input type="text" id="precio-gasto-usd" class="input-moneda" required placeholder="0,00">
                </div>

                <div class="form-group" style="flex: 2;">
                    <label for="detalle-gasto">Descripción</label>
                    <input type="text" id="detalle-gasto" required placeholder="Ej. Cemento Portland">
                </div>
                
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <button type="submit" id="btn-submit-gasto" class="btn-submit">Agregar Gasto</button>
                    <button type="button" id="btn-cancelar-edicion" class="btn-text" style="display: none;">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="grafico-container">
            <canvas id="graficoGastos"></canvas>
        </div>

        <div class="toolbar">
            <h3>Registro de gastos</h3>
            <select id="orden-gastos" class="select-sutil">
                <option value="fecha_desc">Más recientes</option>
                <option value="fecha_asc">Más antiguos</option>
                <option value="valor_desc">Mayor valor</option>
                <option value="valor_asc">Menor valor</option>
            </select>
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Categoría</th>
                        <th>Descripción</th>
                        <th>ARS</th>
                        <th>USD</th>
                        <th id="columna-acciones" style="text-align: right;"></th>
                    </tr>
                </thead>
                <tbody id="lista-gastos">
                    </tbody>
            </table>
        </div>

        <div class="totales-footer">
            <div class="total-box">
                <span>Inversión Total (USD)</span>
                <strong style="color: var(--text-muted);">U$D <span id="total-gastos-usd">0.00</span></strong>
            </div>
            <div class="total-box">
                <span>Inversión Total (ARS)</span>
                <strong>$<span id="total-gastos-ars">0.00</span></strong>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, serverTimestamp, doc, updateDoc, deleteDoc, getDocs 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWtvTrQ11b7iWF_5HyZu9SKCmBMnV1f9M",
      authDomain: "calculos-a3461.firebaseapp.com",
      projectId: "calculos-a3461",
      storageBucket: "calculos-a3461.firebasestorage.app",
      messagingSenderId: "319504557142",
      appId: "1:319504557142:web:3211c1473c73d1080cc7f7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let obraActivaId = null;
    let datosObraActiva = null; 
    let unsubscribeGastos = null;
    let chartInstance = null; 
    let gastosActualesEnMemoria = [];
    let obrasMemoria = {}; 
    let tasaDolarOficial = 1000; 

    // DOM
    const selectObra = document.getElementById('select-obra');
    const panelGastos = document.getElementById('panel-gastos');
    const tituloObraActiva = document.getElementById('titulo-obra-activa');
    const formGasto = document.getElementById('form-gasto');
    const btnCrearObra = document.getElementById('btn-crear-obra');
    const inputArs = document.getElementById('precio-gasto-ars');
    const inputUsd = document.getElementById('precio-gasto-usd');
    const selectOrden = document.getElementById('orden-gastos');
    const btnSubmitGasto = document.getElementById('btn-submit-gasto');
    const btnCancelarEdicion = document.getElementById('btn-cancelar-edicion');
    const inputIdEditando = document.getElementById('id-gasto-editando');
    const listaObrasTerminadas = document.getElementById('lista-obras-terminadas');
    const seccionFormularioGastos = document.getElementById('seccion-formulario-gastos');
    const btnTerminarObra = document.getElementById('btn-terminar-obra');
    const btnBorrarObra = document.getElementById('btn-borrar-obra');
    const btnRestaurarObra = document.getElementById('btn-restaurar-obra');
    const badgeEstadoObra = document.getElementById('badge-estado-obra');
    const columnaAcciones = document.getElementById('columna-acciones');

    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.color = '#64748b';

    async function obtenerCotizacionDolar() {
        try {
            const respuesta = await fetch('https://dolarapi.com/v1/dolares/oficial');
            const data = await respuesta.json();
            tasaDolarOficial = data.venta;
            document.getElementById('info-cotizacion').textContent = `Ref: $${tasaDolarOficial}`;
        } catch (error) {
            document.getElementById('info-cotizacion').textContent = `Ref: $${tasaDolarOficial}`;
        }
    }
    obtenerCotizacionDolar();

    function limpiarNumero(stringNum) { return parseFloat(stringNum.replace(/\./g, '').replace(',', '.')) || 0; }
    function formatearConPuntos(num) {
        let partes = num.toFixed(2).replace('.', ',').split(',');
        partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return partes.join(',');
    }

    inputArs.addEventListener('input', function() {
        let val = this.value.replace(/[^\d,]/g, '');
        let partes = val.split(',');
        partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        if (partes.length > 1) { this.value = partes[0] + ',' + partes[1].substring(0, 2); } else { this.value = partes[0]; }
        inputUsd.value = formatearConPuntos(limpiarNumero(this.value) / tasaDolarOficial);
    });

    inputUsd.addEventListener('input', function() {
        let val = this.value.replace(/[^\d,]/g, '');
        let partes = val.split(',');
        partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        if (partes.length > 1) { this.value = partes[0] + ',' + partes[1].substring(0, 2); } else { this.value = partes[0]; }
        inputArs.value = formatearConPuntos(limpiarNumero(this.value) * tasaDolarOficial);
    });

    const qObras = query(collection(db, "obras"), orderBy("fechaCreacion", "desc"));
    onSnapshot(qObras, (snapshot) => {
        const valorActualSelect = selectObra.value;
        selectObra.innerHTML = '<option value="">Buscar obra activa...</option>';
        listaObrasTerminadas.innerHTML = '';
        obrasMemoria = {}; 

        let hayTerminadas = false;

        snapshot.forEach((docSnap) => {
            const obra = docSnap.data();
            const id = docSnap.id;
            obrasMemoria[id] = obra;

            const estado = obra.estado || 'activa'; 

            if (estado === 'activa') {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = obra.nombre;
                selectObra.appendChild(option);
            } else if (estado === 'terminada') {
                hayTerminadas = true;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="width: 70%;"><strong>${obra.nombre}</strong></td>
                    <td style="text-align: right;"><button class="btn-text" onclick="window.cargarObraDesdeHistorial('${id}')">Ver detalles →</button></td>
                `;
                listaObrasTerminadas.appendChild(tr);
            }
        });

        if (!hayTerminadas) {
            listaObrasTerminadas.innerHTML = '<tr><td colspan="2" style="text-align:center; color: #64748b;">No hay obras en el historial.</td></tr>';
        }

        if (valorActualSelect && obrasMemoria[valorActualSelect]?.estado !== 'terminada') {
            selectObra.value = valorActualSelect;
        } else if (valorActualSelect) {
            selectObra.value = ""; 
        }
    });

    btnCrearObra.addEventListener('click', async () => {
        const nombreInput = document.getElementById('nombre-obra');
        if (!nombreInput.value.trim()) return;
        try {
            const docRef = await addDoc(collection(db, "obras"), {
                nombre: nombreInput.value.trim(),
                estado: 'activa', 
                fechaCreacion: serverTimestamp()
            });
            nombreInput.value = '';
            selectObra.value = docRef.id;
            selectObra.dispatchEvent(new Event('change'));
            document.getElementById('acordeon-activas').removeAttribute('open');
        } catch (e) { console.error(e); }
    });

    selectObra.addEventListener('change', (e) => {
        const id = e.target.value;
        if (id) {
            cargarInterfazObra(id);
            document.getElementById('acordeon-historial').removeAttribute('open');
        } else {
            panelGastos.style.display = 'none';
        }
    });

    window.cargarObraDesdeHistorial = function(id) {
        selectObra.value = ""; 
        cargarInterfazObra(id);
        document.getElementById('acordeon-historial').removeAttribute('open');
    };

    function cargarInterfazObra(id) {
        obraActivaId = id;
        datosObraActiva = obrasMemoria[id];
        
        if (unsubscribeGastos) unsubscribeGastos();
        
        tituloObraActiva.textContent = datosObraActiva.nombre;
        panelGastos.style.display = 'block';
        
        if (datosObraActiva.estado === 'terminada') {
            badgeEstadoObra.textContent = "Terminada";
            badgeEstadoObra.className = "badge estado-terminada";
            seccionFormularioGastos.style.display = 'none'; 
            columnaAcciones.style.display = 'none'; 
            btnTerminarObra.style.display = 'none';
            btnRestaurarObra.style.display = 'inline-block';
        } else {
            badgeEstadoObra.textContent = "Activa";
            badgeEstadoObra.className = "badge estado-activa";
            seccionFormularioGastos.style.display = 'block'; 
            columnaAcciones.style.display = 'table-cell'; 
            btnTerminarObra.style.display = 'inline-block';
            btnRestaurarObra.style.display = 'none';
        }

        resetearFormulario();
        escucharGastos(obraActivaId);
        panelGastos.scrollIntoView({ behavior: 'smooth' });
    }

    btnTerminarObra.addEventListener('click', async () => {
        if(confirm("¿Archivar esta obra? No se podrán cargar más gastos.")){
            await updateDoc(doc(db, "obras", obraActivaId), { estado: 'terminada' });
            cargarInterfazObra(obraActivaId); 
            document.getElementById('acordeon-historial').setAttribute('open', '');
        }
    });

    btnRestaurarObra.addEventListener('click', async () => {
        await updateDoc(doc(db, "obras", obraActivaId), { estado: 'activa' });
        selectObra.value = obraActivaId; 
        cargarInterfazObra(obraActivaId);
    });

    btnBorrarObra.addEventListener('click', async () => {
        if(confirm("Se borrará la obra y todos sus gastos de forma permanente. ¿Confirmar?")){
            try {
                const qBorrar = query(collection(db, "gastos"), where("obraId", "==", obraActivaId));
                const snapshotBorrar = await getDocs(qBorrar);
                snapshotBorrar.forEach(async (docGasto) => {
                    await deleteDoc(docGasto.ref);
                });
                await deleteDoc(doc(db, "obras", obraActivaId));
                panelGastos.style.display = 'none';
                obraActivaId = null;
            } catch (error) {
                console.error("Error al borrar:", error);
            }
        }
    });

    function escucharGastos(obraId) {
        const qGastos = query(collection(db, "gastos"), where("obraId", "==", obraId));
        unsubscribeGastos = onSnapshot(qGastos, (snapshot) => {
            gastosActualesEnMemoria = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data(),
                tiempoReal: doc.data().timestamp ? doc.data().timestamp.toMillis() : Date.now() 
            }));
            renderizarTablaYGrafico();
        });
    }

    selectOrden.addEventListener('change', renderizarTablaYGrafico);

    function renderizarTablaYGrafico() {
        const listaGastos = document.getElementById('lista-gastos');
        const spanTotalArs = document.getElementById('total-gastos-ars');
        const spanTotalUsd = document.getElementById('total-gastos-usd');
        
        let totalArs = 0;
        let totalUsd = 0;
        listaGastos.innerHTML = '';
        const gastosPorFecha = {}; 

        const orden = selectOrden.value;
        let gastosOrdenados = [...gastosActualesEnMemoria].sort((a, b) => {
            if (orden === 'fecha_desc') return b.tiempoReal - a.tiempoReal;
            if (orden === 'fecha_asc') return a.tiempoReal - b.tiempoReal;
            if (orden === 'valor_desc') return b.precio - a.precio;
            if (orden === 'valor_asc') return a.precio - b.precio;
            return 0;
        });

        const esTerminada = datosObraActiva && datosObraActiva.estado === 'terminada';

        if (gastosOrdenados.length === 0) {
            const colSpan = esTerminada ? "5" : "6";
            listaGastos.innerHTML = `<tr><td colspan="${colSpan}" style="text-align:center; color: #64748b; padding: 30px;">Aún no hay gastos registrados.</td></tr>`;
            spanTotalArs.textContent = '0.00';
            spanTotalUsd.textContent = '0.00';
            actualizarGrafico({});
            return;
        }

        gastosOrdenados.forEach((gasto) => {
            totalArs += gasto.precio;
            let usdGasto = gasto.precio / gasto.cotizacionDolarGuardada; 
            totalUsd += usdGasto;
            
            let claseCat = gasto.categoria === 'Materiales' ? 'cat-materiales' : 
                           gasto.categoria === 'Mano de Obra' ? 'cat-mano-obra' : 'cat-extras';

            const detSeguro = gasto.detalle.replace(/'/g, "\\'");

            const tr = document.createElement('tr');
            
            let htmlFila = `
                <td style="color: var(--text-muted); font-size: 0.85rem;">${gasto.fechaStr}</td>
                <td><span class="badge ${claseCat}">${gasto.categoria}</span></td>
                <td>${gasto.detalle}</td>
                <td class="td-precio">$${gasto.precio.toLocaleString('es-AR', { minimumFractionDigits: 2 })}</td>
                <td class="td-usd">U$D ${usdGasto.toLocaleString('es-AR', { minimumFractionDigits: 2 })}</td>
            `;

            if (!esTerminada) {
                htmlFila += `<td style="text-align: right;">
                    <button type="button" class="btn-text" onclick="window.prepararEdicion('${gasto.id}', '${gasto.categoria}', ${gasto.precio}, ${usdGasto}, '${detSeguro}')">Editar</button>
                </td>`;
            }

            tr.innerHTML = htmlFila;
            listaGastos.appendChild(tr);

            if (!gastosPorFecha[gasto.fechaStr]) gastosPorFecha[gasto.fechaStr] = 0;
            gastosPorFecha[gasto.fechaStr] += gasto.precio;
        });

        spanTotalArs.textContent = totalArs.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        spanTotalUsd.textContent = totalUsd.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        actualizarGrafico(gastosPorFecha);
    }

    function actualizarGrafico(datosFechas) {
        const fechasOrdenadas = Object.keys(datosFechas).sort((a, b) => {
            const dateA = new Date(a.split('/').reverse().join('-')); 
            const dateB = new Date(b.split('/').reverse().join('-'));
            return dateA - dateB;
        });
        const valores = fechasOrdenadas.map(f => datosFechas[f]);

        const ctx = document.getElementById('graficoGastos').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        // Si no hay datos, no dibujamos el canvas
        if(valores.length === 0) return;

        // Gradiente elegante para el gráfico
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(37, 99, 235, 0.2)');   
        gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: fechasOrdenadas,
                datasets: [{
                    label: 'Inversión Diaria ($)',
                    data: valores, 
                    borderColor: '#2563eb', 
                    backgroundColor: gradient,
                    borderWidth: 2, 
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#2563eb',
                    pointBorderWidth: 2,
                    pointRadius: 4, 
                    pointHoverRadius: 6,
                    fill: true, 
                    tension: 0.4
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#0f172a',
                        padding: 12,
                        cornerRadius: 8,
                        titleFont: { size: 13 },
                        bodyFont: { size: 14, weight: 'bold' },
                        displayColors: false
                    }
                },
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#f1f5f9', drawBorder: false },
                        border: { display: false }
                    },
                    x: {
                        grid: { display: false },
                        border: { display: false }
                    }
                } 
            }
        });
    }

    window.prepararEdicion = function(id, categoria, precioArs, precioUsd, detalle) {
        inputIdEditando.value = id;
        document.getElementById('categoria-gasto').value = categoria;
        inputArs.value = formatearConPuntos(precioArs);
        inputUsd.value = formatearConPuntos(precioUsd);
        document.getElementById('detalle-gasto').value = detalle;

        const btnSubmit = document.getElementById('btn-submit-gasto');
        btnSubmit.textContent = 'Guardar Cambios';
        btnSubmit.style.backgroundColor = '#1e293b';
        btnCancelarEdicion.style.display = 'inline-block';
        document.getElementById('seccion-formulario-gastos').scrollIntoView({ behavior: 'smooth' });
    };

    function resetearFormulario() {
        formGasto.reset();
        inputIdEditando.value = '';
        const btnSubmit = document.getElementById('btn-submit-gasto');
        btnSubmit.textContent = 'Agregar Gasto';
        btnSubmit.style.backgroundColor = 'var(--accent)';
        btnCancelarEdicion.style.display = 'none';
    }

    btnCancelarEdicion.addEventListener('click', resetearFormulario);

    formGasto.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!obraActivaId || datosObraActiva.estado === 'terminada') return;

        btnSubmitGasto.disabled = true;
        const textoOriginal = btnSubmitGasto.textContent;
        btnSubmitGasto.textContent = 'Guardando...';

        let precioArsLimpio = limpiarNumero(inputArs.value);
        let precioUsdLimpio = limpiarNumero(inputUsd.value);
        let cotizacionGuardada = precioArsLimpio / precioUsdLimpio; 

        const idEditando = inputIdEditando.value;

        try {
            if (idEditando) {
                await updateDoc(doc(db, "gastos", idEditando), {
                    categoria: document.getElementById('categoria-gasto').value,
                    precio: precioArsLimpio,
                    cotizacionDolarGuardada: cotizacionGuardada,
                    detalle: document.getElementById('detalle-gasto').value.trim()
                });
            } else {
                const fechaActual = new Date().toLocaleDateString('es-AR', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });
                await addDoc(collection(db, "gastos"), {
                    obraId: obraActivaId,
                    categoria: document.getElementById('categoria-gasto').value,
                    precio: precioArsLimpio,
                    cotizacionDolarGuardada: cotizacionGuardada,
                    detalle: document.getElementById('detalle-gasto').value.trim(),
                    fechaStr: fechaActual,
                    timestamp: serverTimestamp() 
                });
            }
            resetearFormulario();
        } catch (error) {
            console.error(error);
        } finally {
            btnSubmitGasto.disabled = false;
            btnSubmitGasto.textContent = textoOriginal;
        }
    });
</script>
